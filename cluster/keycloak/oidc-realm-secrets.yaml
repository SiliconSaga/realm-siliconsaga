# ESO delivery of the siliconsaga realm's OIDC provisioning secrets.
#
# The openbao-cli client secret and the dev-user password are born in OpenBao
# (secret/leidangr/oidc) and never touch git. ESO materializes them into a
# plain Kubernetes Secret in the keycloak namespace, which the
# KeycloakRealmImport then injects via ${...} placeholders (realm-import.yaml).
# Same born-in-OpenBao → ESO → realm-import-placeholder pattern as the SSO demo.
#
# Until the OpenBao path is seeded (see leidangr docs/development/openbao-setup.md)
# this ExternalSecret simply waits and the materialized Secret is absent — that
# is the designed resting state, and the realm import's placeholder resolution
# blocks until it exists.
#
# The spelled-out target/remoteRef fields match what the live object carries
# after the ESO CRD's OpenAPI schema defaults are applied at admission, so
# ArgoCD does not report perpetual OutOfSync drift (same pattern as the
# demo-from-openbao ExternalSecret in openbao/secretstore.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: leidangr-oidc-realm-secrets
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-kv
    kind: ClusterSecretStore
  target:
    name: leidangr-oidc-realm-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: client-secret
      remoteRef:
        key: secret/leidangr/oidc
        property: client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: dev-user-password
      remoteRef:
        key: secret/leidangr/oidc
        property: dev-user-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
