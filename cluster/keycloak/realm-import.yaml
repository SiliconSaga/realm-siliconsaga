# siliconsaga realm: the real OIDC client(s) + a dev user, imported declaratively.
#
# Secrets never live in this file. The openbao-cli client secret and the dev
# user's password are born in OpenBao (secret/leidangr/oidc), delivered by ESO
# into the `leidangr-oidc-realm-secrets` Secret (oidc-realm-secrets.yaml), and
# injected here through `${...}` placeholders — the same born-in-OpenBao → ESO →
# realm-import pattern the SSO demo uses. Until that OpenBao path is seeded the
# import waits (placeholders unresolved); that is the designed resting state.
#
# `openbao-cli` is the confidential client behind `bao login -method=oidc`
# (leidangr's dev-secrets). Backstage/Ting web clients arrive here later.
apiVersion: k8s.keycloak.org/v2beta1
kind: KeycloakRealmImport
metadata:
  name: siliconsaga-realm
  namespace: keycloak
spec:
  keycloakCRName: keycloak
  placeholders:
    LEIDANGR_OIDC_CLIENT_SECRET:
      secret:
        name: leidangr-oidc-realm-secrets
        key: client-secret
    LEIDANGR_OIDC_DEV_USER_PASSWORD:
      secret:
        name: leidangr-oidc-realm-secrets
        key: dev-user-password
  realm:
    realm: siliconsaga
    enabled: true
    displayName: SiliconSaga
    clients:
      # Confidential client for the OpenBao OIDC auth method. Standard flow only;
      # redirect URIs are the `bao` CLI's local callback (port 8250, both
      # localhost and 127.0.0.1). Secret delivered from OpenBao via ESO.
      - clientId: openbao-cli
        name: "OpenBao CLI (bao login -method=oidc)"
        enabled: true
        protocol: openid-connect
        publicClient: false
        secret: "${LEIDANGR_OIDC_CLIENT_SECRET}"
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: false
        redirectUris:
          - "http://localhost:8250/oidc/callback"
          - "http://127.0.0.1:8250/oidc/callback"
    users:
      # Dev user to authenticate as during the OIDC login. Role-only gating in
      # OpenBao means any authenticated realm user gets the leidangr-dev-read
      # policy; this seeds a generic (non-personal) one so a fresh bootstrap has
      # a working login. Password delivered from OpenBao via ESO.
      - username: leidangr-dev
        enabled: true
        email: leidangr-dev@example.com
        emailVerified: true
        firstName: Leidangr
        lastName: Dev
        credentials:
          - type: password
            value: "${LEIDANGR_OIDC_DEV_USER_PASSWORD}"
            temporary: false
