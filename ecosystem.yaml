# ecosystem.yaml — SiliconSaga Community Realm
#
# This realm declares the SiliconSaga ecosystem components, defaults,
# and identity. It is merged with upstream Yggdrasil's ecosystem.yaml
# and any per-developer ecosystem.local.yaml overrides.

defaults:
  chartRegistry: oci://ghcr.io/siliconsaga
  gitOrg: https://github.com/SiliconSaga
  gitea:
    # Internal Gitea URL pattern used by ArgoCD inside the cluster.
    # {repo} is replaced by the component name at resolve time.
    internalUrl: "http://gitea-http.gitea.svc.cluster.local:3000/nordri-admin/{repo}.git"

identity:
  agent_account: agent-refr
  # co_authored_by is intentionally unset here — when omitted,
  # ws-commit.sh falls back to "Claude ${CLAUDE_MODEL:-Opus 4.7}",
  # so the trailer tracks whichever model is actually running. A
  # static value here would override the dynamic mechanism and age
  # as Anthropic ships new models.
  #
  # Override only if a non-Claude agent is running this realm:
  # co_authored_by: "MyBot 1.0"
  #
  # human_account is personal — set it in ecosystem.local.yaml, not here

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------

components:
  # -- Tier 1: Cluster Substrate -------------------------------------------
  nordri:
    tier: 1
    chartVersion: "0.0.0"
    path: "platform/fundamentals"
    namespace: argo

  # -- Tier 2: Platform ----------------------------------------------------
  nidavellir:
    tier: 2
    chartVersion: "0.0.0"
    path: "apps"
    namespace: argo

  mimir:
    tier: 2
    chartVersion: "0.0.0"
    namespace: mimir
    values:
      postgres:
        enabled: true
      kafka:
        enabled: false
      valkey:
        enabled: false

  vordu:
    tier: 2
    chartVersion: "0.0.0"
    namespace: vordu

  heimdall:
    tier: 2
    chartVersion: "0.0.0"
    namespace: heimdall

  # -- Tier 2: Platform Services --------------------------------------------
  tafl:
    tier: 2
    chartVersion: "0.0.0"
    namespace: tafl

  bifrost:
    tier: 2
    chartVersion: "0.0.0"
    namespace: bifrost

  # knarr — integration/bridging layer (Matrix homeserver, bridge fleet,
  # Kafka bus, routing). See docs/plans/2026-04-02-knarr-design.md.
  knarr:
    tier: 2
    chartVersion: "0.0.0"
    namespace: knarr

  # -- Tier 3: End-User Platform -------------------------------------------
  ymir:
    tier: 3
    chartVersion: "0.0.0"
    namespace: ymir

  terasology:
    tier: 3
    chartVersion: "0.0.0"
    chartName: "ts-game"
    namespace: terasology

  destinationsol:
    tier: 3
    chartVersion: "0.0.0"
    chartName: "ds-game"
    namespace: destinationsol

  ting:
    tier: 3
    chartVersion: "0.0.0"
    namespace: ting

  # schools — overarching volunteer pitch for the local school system,
  # a custom site akin to ting. Forward-looking framing lives in the component
  # repo itself: https://github.com/SiliconSaga/schools/blob/main/next-year.md
  schools:
    tier: 3
    chartVersion: "0.0.0"
    namespace: schools

  # skipta — AI-backed field amendment & signing demo (voice → Gemini →
  # Sheets pricing → signed PDF in Drive). Design doc lives in yggdrasil
  # docs/plans/2026-07-01-skipta-field-amendments-design.md.
  skipta:
    tier: 3
    chartVersion: "0.0.0"
    namespace: skipta

  # mtl-site — Mountain Top League youth sports site. Static Jekyll on
  # GitHub Pages today (not cluster-deployed); declared here so the workspace
  # can clone/exec/commit it. See docs/plans/2026-04-08-mtl-site-design.md.
  mtl-site:
    tier: 3
    chartVersion: "0.0.0"
    namespace: mtl-site

  # leidangr — Backstage control-plane for the Leiðangr community-coordination
  # stack. Local-first skeleton today (not cluster-deployed); declared here so the
  # workspace can clone/exec/commit/test it. See
  # docs/plans/2026-06-21-leidangr-phase2-backstage-skeleton-design.md and
  # adapters/leidangr.yaml.
  leidangr:
    tier: 3
    chartVersion: "0.0.0"
    namespace: leidangr

  # -- Vendored upstream mirrors --------------------------------------------
  # Read-only mirrors of third-party repos the stack deploys from. Kept as
  # individual, intact mirrors (full history + tags) under the SiliconSaga
  # org so: (1) third-party bytes never inflate the repos we maintain or
  # their stats/review surface, (2) `ws clone` fetches them naturally with
  # everything else, (3) the hydration script pushes them — history and
  # tags — into the seed Gitea so ArgoCD can pin exact upstream tags
  # in-cluster. Never commit local changes to a vendor mirror; re-sync from
  # upstream instead (forgejo-day2 will make these self-maintaining
  # pull-mirrors). See docs/plans/2026-06-11-sso-demo-design.md context.
  keycloak-k8s-resources:
    tier: vendor
    chartVersion: "0.0.0"
    namespace: keycloak

  # -- Test chart (validates chart-mode resolution) ------------------------
  echo-test:
    tier: test
    chartVersion: "0.1.0"
    chartName: "echo-test"
    namespace: echo-test
    disabled: true
