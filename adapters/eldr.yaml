# eldr adapter — pytest via venv-pinned python.
# Component cwd is components/eldr/ when ws-test runs; .venv lives there and the
# top-level `eldr` package imports cleanly from that directory.
commands:
  test: ".venv/bin/python -m pytest eldr/tests -v"

ai_context:
  - path: "README.md"
    description: "Eldr overview, usage, side-car format, and roadmap"
  - path: "eldr/example-sidecar.yaml"
    description: "Documented side-car template (assemblies, design, cooling, equipment)"
