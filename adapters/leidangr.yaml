# leidangr adapter — Backstage app (Yarn 4 via Corepack; no global yarn).
# Component cwd is components/leidangr/ when ws test / ws lint run.
#
# test: the test suites only — the DevEx envelope + BDD acceptance (jest-cucumber,
# `make test`) AND the app/plugin/backend unit tests (`make test-app`,
# backstage-cli; CI=true in the Makefile so it runs once instead of watching).
# lint: the static checks — repo ESLint across all workspaces (`make lint`) PLUS
# the whole-repo typecheck (`make tsc`), which catches wiring/import errors ESLint
# misses. (tsc is a static check, not a test, so it lives under lint.)
#
# The full local gate (config-check + lint + tsc + both test suites) remains
# `make ci`; run it via `ws exec leidangr make ci` until a dedicated `ws ci` verb
# lands. Adapter commands are whitespace-tokenized (no shell), so multi-target
# make invocations (`make test test-app`) work, but shell operators do not.
commands:
  test: "make test test-app"
  lint: "make lint tsc"

ai_context:
  - path: "README.md"
    description: "Backstage app overview"
  - path: "Makefile"
    description: "DevEx envelope targets (doctor/deps/dev/test/secrets/ci)"
